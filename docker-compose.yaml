services:
  9router:
    image: ghcr.io/decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    ports:
      - "20128:20128"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - ./9router-data:/app/data

  cloudflare-tunnel:
    build:
      context: ./tunnel
    container_name: 9router-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
      - TZ=UTC
    depends_on:
      - 9router
